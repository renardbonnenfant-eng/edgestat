<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <!-- v2.1 --><title>Verdikt — encyclopédie du football</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { background: #1C2A3A; }
      @keyframes verdikt-blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.3; }
      }
      @keyframes newsProgress {
        from { width: 0%; }
        to   { width: 100%; }
      }
      /* ── Responsive mobile ──────────────────────────────── */
      @media screen and (max-width: 900px) {
        .vdk-ad-column   { display: none !important; }
        .vdk-sidebar     { position: fixed !important; top: 0; left: 0; z-index: 199;
                           box-shadow: 4px 0 24px rgba(0,0,0,.6) !important; }
        .vdk-sidebar-hidden { display: none !important; }
        .vdk-hamburger   { display: flex !important; }
        .vdk-username-desktop { display: none !important; }
      }
      @media screen and (min-width: 901px) {
        .vdk-hamburger   { display: none !important; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
